name: Version change checker
permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Cancel older in-progress runs for the same PR or the same ref (branch)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  UBUNTU_VERSION: "ubuntu-24.04"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check if VERSION file was modified
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          git fetch --no-tags --depth=1 origin "$BASE_REF"
          changed_files="$(git diff --name-only "origin/$BASE_REF"...HEAD)"

          product_changes="$(
            printf '%s\n' "$changed_files" |
              grep -E '^(backend/|frontend/|docker-compose|Dockerfile|charts/|helm/|pyproject\.toml|poetry\.lock|package\.json|pnpm-lock\.yaml)' || true
          )"

          if [[ -z "$product_changes" ]]; then
            echo "No product/runtime files changed; skipping VERSION requirement."
            exit 0
          fi

          version_file="backend/ciso_assistant/VERSION"
          if printf '%s\n' "$changed_files" | grep -Fxq "$version_file"; then
            echo "$version_file has been modified in this pull request."
          else
            echo "::error::$version_file must be modified in this pull request."
            exit 1
          fi
