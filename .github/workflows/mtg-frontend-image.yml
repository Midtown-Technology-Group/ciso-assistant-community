name: MTG Build Frontend Image

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/mtg-frontend-image.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional additional image tag, for example mtg-2026-05-24"
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-frontend:
    name: Build and push frontend image
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          image="$(echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/mtg-ciso-assistant-frontend" | tr '[:upper:]' '[:lower:]')"
          short_sha="$(git rev-parse --short=9 HEAD)"
          {
            echo "name=$image"
            echo "short_sha=$short_sha"
            echo "tags<<EOF"
            echo "$image:mtg-$short_sha"
            echo "$image:sha-${GITHUB_SHA}"
            if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
              echo "$image:mtg-main"
            fi
            if [[ -n "${INPUT_TAG}" ]]; then
              echo "$image:${INPUT_TAG}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.title=CISO Assistant Frontend
            org.opencontainers.image.description=MTG fork of CISO Assistant frontend
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=AGPL-3.0
          sbom: true
          provenance: true

      - name: Summarize image
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_SHORT_SHA: ${{ steps.image.outputs.short_sha }}
          IMAGE_TAGS: ${{ steps.image.outputs.tags }}
        run: |
          {
            echo "### Frontend image"
            echo
            echo "Image: \`$IMAGE_NAME\`"
            echo "Primary tag: \`mtg-$IMAGE_SHORT_SHA\`"
            echo
            echo "All tags:"
            while IFS= read -r tag; do
              echo "- \`$tag\`"
            done <<< "$IMAGE_TAGS"
          } >> "$GITHUB_STEP_SUMMARY"
